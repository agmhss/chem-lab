<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acids & Bases Lab | அமிலம் மற்றும் காரம்</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #e8f5e9; font-family: 'Segoe UI', sans-serif; }
        .lab-container { background: white; border-radius: 20px; padding: 30px; margin-top: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .beaker { width: 150px; height: 180px; border: 4px solid #333; border-top: none; border-radius: 0 0 20px 20px; position: relative; margin: 0 auto; overflow: hidden; background: #fff; }
        .liquid { position: absolute; bottom: 0; width: 100%; height: 70%; transition: background 0.5s ease; }
        .litmus-strip { width: 30px; height: 100px; margin: 0 auto; border: 1px solid #ccc; transition: background 0.3s; cursor: pointer; border-radius: 5px; }
        .red-litmus { background-color: #ffcccc; border: 2px solid #ff0000; }
        .blue-litmus { background-color: #ccccff; border: 2px solid #0000ff; }
        .controls { margin-top: 20px; }
    </style>
</head>
<body>

<div class="container text-center">
    <div class="lab-container">
        <h2 id="title">அமிலம் - காரம் சோதனை (Acids & Bases)</h2>
        <hr>

        <div class="row mt-4">
            <div class="col-md-6">
                <div class="beaker">
                    <div id="liquidColor" class="liquid" style="background-color: rgba(200, 200, 200, 0.3);"></div>
                </div>
                <h5 class="mt-3" id="solutionName">கரைசலைத் தேர்ந்தெடுக்கவும்</h5>
            </div>

            <div class="col-md-6">
                <p><strong>படி 1:</strong> ஒரு கரைசலைத் தேர்ந்தெடுக்கவும்</p>
                <div class="btn-group mb-4">
                    <button class="btn btn-outline-danger" onclick="setSolution('acid', 'எலுமிச்சை சாறு (அமிலம்)')">Acid (Lemon Juice)</button>
                    <button class="btn btn-outline-primary" onclick="setSolution('base', 'சோப்பு நீர் (காரம்)')">Base (Soap Water)</button>
                </div>

                <p><strong>படி 2:</strong> லிட்மஸ் தாளை கரைசலில் நனைக்கவும்</p>
                <div class="d-flex justify-content-around">
                    <div>
                        <div id="redStrip" class="litmus-strip red-litmus" onclick="testLitmus('red')"></div>
                        <small>சிவப்பு லிட்மஸ்</small>
                    </div>
                    <div>
                        <div id="blueStrip" class="litmus-strip blue-litmus" onclick="testLitmus('blue')"></div>
                        <small>நீல லிட்மஸ்</small>
                    </div>
                </div>
                
                <div id="resultAlert" class="alert mt-4 d-none"></div>
                <button class="btn btn-secondary mt-3" onclick="resetLab()">மீண்டும் செய்க (Reset)</button>
            </div>
        </div>
    </div>
    <a href="index.html" class="btn btn-link mt-3 text-dark">முகப்புப் பக்கத்திற்குச் செல்ல</a>
</div>

<script>
    let selectedType = '';

    function setSolution(type, name) {
        selectedType = type;
        document.getElementById('solutionName').innerText = name;
        document.getElementById('liquidColor').style.backgroundColor = (type === 'acid') ? 'rgba(255, 255, 0, 0.2)' : 'rgba(0, 255, 0, 0.1)';
        document.getElementById('resultAlert').classList.add('d-none');
    }

    function testLitmus(color) {
        if (!selectedType) {
            alert("தயவுசெய்து முதலில் ஒரு கரைசலைத் தேர்ந்தெடுக்கவும்!");
            return;
        }

        const alertBox = document.getElementById('resultAlert');
        alertBox.classList.remove('d-none', 'alert-danger', 'alert-primary', 'alert-warning');

        if (color === 'blue' && selectedType === 'acid') {
            document.getElementById('blueStrip').style.backgroundColor = '#ff4d4d'; // Turns Red
            alertBox.innerText = "நீல லிட்மஸ் சிவப்பாக மாறியது - இது ஓர் அமிலம்!";
            alertBox.classList.add('alert-danger');
        } 
        else if (color === 'red' && selectedType === 'base') {
            document.getElementById('redStrip').style.backgroundColor = '#4d4dff'; // Turns Blue
            alertBox.innerText = "சிவப்பு லிட்மஸ் நீலமாக மாறியது - இது ஒரு காரம்!";
            alertBox.classList.add('alert-primary');
        } 
        else {
            alertBox.innerText = "நிறமாற்றம் ஏதுமில்லை!";
            alertBox.classList.add('alert-warning');
        }
    }

    function resetLab() {
        location.reload();
    }
</script>

</body>
</html>
